<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paranormal Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/icon.png" type="image/png">
</head>

<body>
    <header>
        <h1>Paranormal Puzzle</h1>
    </header>
    <div class="gradient-top"></div>

    <section class="polaroid-container">
        <div class="polaroid" data-img="assets/images/image_001.jpg">
            <img src="assets/images/image_001.jpg" alt="Polaroid">
            <p>Do czego to służy?</p>
        </div>
        <div class="polaroid" data-img="assets/images/image_002.jpg">
            <img src="assets/images/image_002.jpg" alt="Polaroid">
            <p>Czy ktoś tam jest?</p>
        </div>
        <div class="polaroid" data-img="assets/images/image_003.jpg">
            <img src="assets/images/image_003.jpg" alt="Polaroid">
            <p>Cmentarna układanka...</p>
        </div>
        <div class="polaroid" data-img="assets/images/image_004.jpg">
            <img src="assets/images/image_004.jpg" alt="Polaroid">
            <p>Znaleźliśmy dowód!</p>
        </div>
        <div class="polaroid" data-img="assets/images/image_005.jpg">
            <img src="assets/images/image_005.jpg" alt="Polaroid">
            <p>Czy to czarne lustro!?</p>
        </div>
        <div class="upload-polaroid">
            <div id="dropZone">
                <div class="plus">+</div>
            </div>
            <p>Dodaj swoje puzzle...</p>
        </div>
    </section>

    <section class="row">
        <section class="board-section">
            <h2>Układanka</h2>
            <div id="puzzle"></div>
        </section>

        <section class="board-section">
            <h2>Plansza</h2>
            <div id="board"></div>
        </section>
    </section>

    <div class="gradient-bottom"></div>
    <footer>
        <p>© 2026 Paranormal Puzzle. Wszelkie prawa zastrzeżone.</p>
        <p>Projekt i wykonanie: Maciek104</p>
    </footer>
</body>

<script src="scripts/script.js"></script>
<script src="scripts/upload.js"></script>

</html>
